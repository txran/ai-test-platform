<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}测试网站{% endblock %}</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f5f5f5; }
        nav { background: #1890ff; color: white; padding: 16px 24px; display: flex; justify-content: space-between; }
        nav a { color: white; text-decoration: none; margin-right: 16px; }
        nav a:hover { text-decoration: underline; }
        .container { max-width: 1000px; margin: 0 auto; padding: 24px; }
        .card { background: white; border-radius: 8px; padding: 24px; margin-bottom: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .btn { padding: 8px 16px; border: none; border-radius: 4px; cursor: pointer; font-size: 14px; }
        .btn-primary { background: #1890ff; color: white; }
        .btn-primary:hover { background: #096dd9; }
        .btn-danger { background: #ff4d4f; color: white; }
        .error { color: #ff4d4f; font-size: 14px; margin-bottom: 12px; }
        .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 16px; }
        .product-card { background: white; border-radius: 8px; padding: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .product-card h3 { margin-bottom: 8px; }
        .product-card .price { color: #ff4d4f; font-size: 18px; font-weight: bold; }
    </style>
</head>
<body>
    <nav>
        <div>
            <a href="/">首页</a>
            <a href="/products">商品</a>
            <a href="/cart">购物车</a>
        </div>
        <div>
            {% if session.get("username") %}
                <span>欢迎, {{ session.get("name") }}</span>
                <a href="/logout">退出</a>
            {% else %}
                <a href="/login">登录</a>
            {% endif %}
        </div>
    </nav>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
