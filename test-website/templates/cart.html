{% extends "base.html" %}
{% block title %}购物车{% endblock %}
{% block content %}
<h2 style="margin-bottom:16px">购物车</h2>
<div id="cart-list"></div>
<div id="empty-cart" class="card" style="display:none;text-align:center;color:#666">购物车是空的</div>
<script>
async function loadCart() {
    const res = await fetch('/api/cart/get');
    const data = await res.json();
    const list = document.getElementById('cart-list');
    const empty = document.getElementById('empty-cart');
    if (data.items && data.items.length > 0) {
        list.innerHTML = data.items.map(item => 
            `<div class="card"><h3>${item.product.name}</h3><div class="price">¥${item.product.price} x ${item.quantity} = ¥${item.product.price * item.quantity}</div></div>`
        ).join('');
    } else {
        empty.style.display = 'block';
    }
}
loadCart();
</script>
{% endblock %}
