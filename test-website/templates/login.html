{% extends "base.html" %}
{% block title %}登录{% endblock %}
{% block content %}
<div class="card" style="max-width:400px;margin:0 auto">
    <h2>用户登录</h2>
    <form method="POST">
        <div style="margin:12px 0">
            <label>用户名</label>
            <input type="text" name="username" id="username" value="admin" style="width:100%;padding:8px;border:1px solid #d9d9d9;border-radius:4px">
        </div>
        <div style="margin:12px 0">
            <label>密码</label>
            <input type="password" name="password" id="password" value="123456" style="width:100%;padding:8px;border:1px solid #d9d9d9;border-radius:4px">
        </div>
        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}
        <button type="submit" class="btn btn-primary" style="width:100%">登录</button>
    </form>
    <div style="margin-top:16px;color:#666;font-size:12px">
        测试账号: admin/123456 或 test/test123
    </div>
</div>
{% endblock %}
